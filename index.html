<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#1E1E2E">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="公考速记">
<title>公考速记</title>
<style>
/* ============ 基础变量 ============ */
:root {
  --s1: #81C8B5; --s1l: #E8F5F0;
  --s2: #A8B8E0; --s2l: #EDF0FA;
  --s3: #C4A8D6; --s3l: #F3EDF8;
  --s4: #F0B896; --s4l: #FDF0E9;
  --s5: #F5D782; --s5l: #FFFBE8;
  --s6: #E8988E; --s6l: #FCEAE8;
  --bg: #FAFAFA; --card: #FFF; --text: #333; --sub: #999; --border: #EEE;
  --radius: 12px; --shadow: 0 2px 12px rgba(0,0,0,.06);
  --font-xs: 11px; --font-sm: 13px; --font-md: 15px; --font-lg: 18px;
}
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
html { height:100%; overflow:hidden; }
body {
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:var(--bg); color:var(--text); height:100%;
  display:flex; flex-direction:column; overflow:hidden;
  -webkit-tap-highlight-color:transparent; user-select:none;
}

/* ============ 顶部栏 ============ */
.topbar {
  display:flex; align-items:center; padding:12px 16px; gap:12px;
  background:var(--card); border-bottom:1px solid var(--border);
  flex-shrink:0; z-index:10;
}
.topbar h1 { font-size:var(--font-lg); font-weight:700; flex:1; white-space:nowrap; }
.topbar-btn {
  width:36px; height:36px; border:none; border-radius:50%; background:transparent;
  font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center;
  transition:background .15s; flex-shrink:0;
}
.topbar-btn:active { background:var(--border); }

/* ============ 搜索栏 ============ */
.search-wrap {
  padding:0 16px 8px; background:var(--card); flex-shrink:0; display:none;
}
.search-wrap.show { display:block; }
.search-input {
  width:100%; height:36px; border:1px solid var(--border); border-radius:18px;
  padding:0 16px; font-size:var(--font-sm); background:var(--bg); outline:none;
}
.search-input:focus { border-color:var(--s1); }

/* ============ 板块标签 ============ */
.tabs-wrap {
  display:flex; gap:6px; padding:8px 16px; background:var(--card);
  border-bottom:1px solid var(--border); flex-shrink:0; overflow-x:auto;
  scrollbar-width:none; -webkit-overflow-scrolling:touch;
}
.tabs-wrap::-webkit-scrollbar { display:none; }
.tab {
  flex-shrink:0; padding:7px 14px; border-radius:20px; border:none;
  font-size:var(--font-sm); font-weight:500; cursor:pointer; white-space:nowrap;
  background:var(--bg); color:var(--sub); transition:all .2s;
}
.tab.active { color:#FFF; font-weight:600; }
.tab.s1.active { background:var(--s1); }
.tab.s2.active { background:var(--s2); }
.tab.s3.active { background:var(--s3); }
.tab.s4.active { background:var(--s4); }
.tab.s5.active { background:var(--s5); }
.tab.s6.active { background:var(--s6); }

/* ============ 主内容区 ============ */
.main {
  flex:1; overflow-y:auto; padding:10px 10px 100px;
  -webkit-overflow-scrolling:touch;
}

/* 空状态 */
.empty-state {
  text-align:center; padding:48px 20px; color:var(--sub);
}
.empty-state .empty-icon { font-size:48px; margin-bottom:12px; }
.empty-state .empty-text { font-size:var(--font-sm); line-height:1.6; }

/* ============ 分组 ============ */
.group {
  margin-bottom:16px; background:var(--card); border-radius:var(--radius);
  box-shadow:0 1px 6px rgba(0,0,0,.05);
}
.group-header { border-radius:var(--radius) var(--radius) 0 0; }
.group-header.collapsed { border-radius:var(--radius); }
.group-header {
  display:flex; align-items:center; padding:14px 14px; gap:10px;
  cursor:pointer; user-select:none; position:relative;
  background:var(--card);
}
.group-header::after {
  content:''; position:absolute; left:14px; right:14px; bottom:0;
  height:1px; background:var(--border);
  transition:opacity .2s;
}
.group-color-bar {
  width:4px; height:22px; border-radius:2px; flex-shrink:0;
}
.group-color-bar.s1 { background:var(--s1); }
.group-color-bar.s2 { background:var(--s2); }
.group-color-bar.s3 { background:var(--s3); }
.group-color-bar.s4 { background:var(--s4); }
.group-color-bar.s5 { background:var(--s5); }
.group-color-bar.s6 { background:var(--s6); }
.group-name {
  flex:1; font-size:var(--font-md); font-weight:600; overflow:hidden;
  text-overflow:ellipsis; white-space:nowrap;
}
.group-count {
  font-size:var(--font-xs); color:var(--sub); flex-shrink:0;
  background:var(--bg); padding:2px 8px; border-radius:10px;
}
.group-arrow {
  font-size:12px; color:var(--sub); transition:transform .2s; flex-shrink:0;
}
.group-arrow.open { transform:rotate(90deg); }
.group-menu-btn {
  width:28px; height:28px; border:none; border-radius:50%; background:transparent;
  font-size:16px; color:var(--sub); cursor:pointer; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
}
.group-menu-btn:active { background:var(--border); }

/* ============ 卡片网格（单栏垂直排列） ============ */
.card-grid {
  display:none; flex-direction:column; gap:8px; padding:0 8px 12px;
}
.card-grid.open { display:flex; }
.card-grid.open.as-list { display:block; }

/* ============ 单张卡片 ============ */
.card {
  position:relative; background:var(--card); border-radius:10px;
  padding:10px; cursor:pointer; transition:transform .12s;
  word-break:break-word; min-height:44px;
  display:flex; flex-direction:column;
  border:1px solid var(--border);
  box-shadow:0 1px 3px rgba(0,0,0,.06);
}
.card:active { transform:scale(.97); box-shadow:0 3px 12px rgba(0,0,0,.1); }
.card-text { font-size:var(--font-xs); line-height:1.6; color:var(--text); }
.card-text.clamp {
  display:-webkit-box; -webkit-box-orient:vertical;
  -webkit-line-clamp:5; overflow:hidden;
}
.card-text-multiline {
  display:block; overflow:hidden; max-height:180px;
  -webkit-mask-image:linear-gradient(to bottom, black 70%, transparent 100%);
  mask-image:linear-gradient(to bottom, black 70%, transparent 100%);
}
.card-img {
  width:100%; height:auto; border-radius:6px; display:block;
}
.card-more {
  position:absolute; top:4px; right:4px; width:28px; height:28px;
  border:none; border-radius:50%; background:rgba(240,240,240,.9);
  font-size:15px; color:var(--text); cursor:pointer; display:flex;
  align-items:center; justify-content:center; z-index:2;
  box-shadow:0 1px 3px rgba(0,0,0,.1);
}
.card-more:active { background:var(--border); }

/* 所有卡片统一撑满分组宽度 */
.card { width:100%; }

/* ============ 成语汇总列表 ============ */
.idiom-list { padding:0; }
.idiom-item {
  display:flex; align-items:flex-start; padding:10px 14px;
  border-bottom:1px solid var(--border); gap:8px; position:relative;
}
.idiom-item:last-child { border-bottom:none; }
.idiom-word {
  font-weight:700; color:var(--s1); font-size:var(--font-md);
  white-space:nowrap; min-width:fit-content;
}
.idiom-def {
  font-size:var(--font-sm); color:var(--text); line-height:1.6;
  flex:1; word-break:break-all;
}
.idiom-item.highlighted { background:#FFF8E1; border-radius:4px; }
.idiom-item.highlighted .idiom-word { color:#F0A030; }
.hl-word { background:#FFE082; padding:1px 3px; border-radius:2px; font-weight:700; }
.hl-input-wrap {
  padding:8px 14px; border-bottom:1px solid var(--border); display:flex; gap:8px; align-items:center;
  position:sticky; top:0; background:var(--card); z-index:3;
}
.hl-input {
  flex:1; height:28px; border:1px solid var(--border); border-radius:14px;
  padding:0 12px; font-size:var(--font-xs); background:var(--bg); outline:none;
}
.hl-input:focus { border-color:var(--s5); }
.hl-hint { font-size:10px; color:var(--sub); white-space:nowrap; }
.sync-bar {
  text-align:center; padding:12px 14px; border-top:1px solid var(--border);
}
.sync-btn {
  width:100%; padding:10px; border:none; border-radius:10px;
  background:var(--s1l); color:var(--s1); font-size:var(--font-sm);
  font-weight:600; cursor:pointer; transition:opacity .15s;
}
.sync-btn:active { opacity:.7; }

/* ============ 弹出菜单 ============ */
.popup-menu {
  position:fixed; z-index:100; background:var(--card); border-radius:var(--radius);
  box-shadow:0 4px 24px rgba(0,0,0,.15); min-width:140px; overflow:hidden;
  animation:popIn .15s ease;
}
@keyframes popIn { from { opacity:0; transform:scale(.9); } to { opacity:1; transform:scale(1); } }
.popup-item {
  display:block; width:100%; padding:12px 16px; border:none; background:transparent;
  font-size:var(--font-sm); text-align:left; cursor:pointer; color:var(--text);
  border-bottom:1px solid var(--border);
}
.popup-item:last-child { border-bottom:none; }
.popup-item:active { background:var(--bg); }
.popup-item.danger { color:#E55; }

/* ============ 底部浮动按钮 ============ */
.fab {
  position:fixed; bottom:32px; right:20px; width:52px; height:52px;
  border-radius:50%; border:none; background:var(--text); color:#FFF;
  font-size:26px; cursor:pointer; z-index:20;
  box-shadow:0 4px 16px rgba(0,0,0,.25); transition:transform .2s;
  display:flex; align-items:center; justify-content:center;
}
.fab:active { transform:scale(.9); }
.fab-menu {
  position:fixed; bottom:96px; right:20px; z-index:20;
  display:flex; flex-direction:column; gap:10px; align-items:flex-end;
}
.fab-menu-item {
  display:flex; align-items:center; gap:8px; padding:10px 16px;
  border-radius:24px; border:none; background:var(--card); color:var(--text);
  font-size:var(--font-sm); cursor:pointer; box-shadow:var(--shadow);
  white-space:nowrap; transition:transform .15s;
}
.fab-menu-item:active { transform:scale(.95); }
.fab-menu-item .fab-menu-icon { font-size:18px; }

/* ============ 遮罩层 ============ */
.overlay {
  position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:120;
  display:flex; align-items:flex-end; justify-content:center;
  animation:fadeIn .2s;
}
.overlay.centered { align-items:center; }
@keyframes fadeIn { from { opacity:0; } to { opacity:1; } }

/* ============ 底部面板 Sheet ============ */
.sheet {
  background:var(--card); border-radius:20px 20px 0 0; width:100%;
  max-height:92vh; overflow-y:auto; padding:20px 16px 24px;
  animation:slideUp .25s ease;
}
.sheet.fullscreen {
  border-radius:0; height:100vh; max-height:100vh;
}
.sheet-title {
  font-size:var(--font-md); font-weight:700; margin-bottom:12px;
  text-align:center;
}
.sheet-field { margin-bottom:10px; }
.sheet-label {
  font-size:var(--font-xs); color:var(--sub); margin-bottom:3px;
  font-weight:500; text-transform:uppercase; letter-spacing:.5px;
}
.sheet-input, .sheet-textarea, .sheet-select {
  width:100%; padding:10px 12px; border:1px solid var(--border);
  border-radius:8px; font-size:var(--font-sm); outline:none;
  background:var(--bg); font-family:inherit;
}
.sheet-input:focus, .sheet-textarea:focus { border-color:var(--s1); }
.sheet-textarea { min-height:260px; resize:none; line-height:1.7; }
.sheet-textarea.tall { min-height:400px; }
.sheet-select { appearance:none; cursor:pointer; }
.sheet-file-area {
  display:flex; align-items:center; justify-content:center;
  padding:24px; border:2px dashed var(--border); border-radius:10px;
  cursor:pointer; transition:border-color .2s; flex-direction:column; gap:6px;
}
.sheet-file-area:active { border-color:var(--s1); }
.sheet-file-area .file-icon { font-size:32px; }
.sheet-file-area .file-hint { font-size:var(--font-xs); color:var(--sub); }
.sheet-file-area input[type=file] { display:none; }
.sheet-preview-img {
  max-width:100%; max-height:200px; border-radius:8px; margin-top:8px;
}
.sheet-actions { display:flex; gap:10px; margin-top:20px; }
.sheet-btn {
  flex:1; padding:12px; border:none; border-radius:10px;
  font-size:var(--font-md); font-weight:600; cursor:pointer; transition:opacity .15s;
}
.sheet-btn:active { opacity:.7; }
.sheet-btn.primary { background:var(--text); color:#FFF; }
.sheet-btn.secondary { background:var(--bg); color:var(--text); }
.sheet-btn.danger { background:#FEE; color:#E55; }

/* ============ 确认对话框 ============ */
.confirm-box {
  background:var(--card); border-radius:16px; padding:24px; width:90%; max-width:320px;
  text-align:center; animation:popIn .2s;
}
.confirm-title { font-size:var(--font-md); font-weight:600; margin-bottom:8px; }
.confirm-text { font-size:var(--font-sm); color:var(--sub); margin-bottom:20px; }

/* ============ 设置面板 ============ */
.settings-section { margin-bottom:20px; }
.settings-section h3 { font-size:var(--font-sm); font-weight:600; margin-bottom:10px; color:var(--sub); }
.settings-row {
  display:flex; align-items:center; justify-content:space-between;
  padding:12px 0; border-bottom:1px solid var(--border);
}
.settings-row span { font-size:var(--font-sm); }
.settings-btn {
  padding:8px 16px; border:none; border-radius:8px; font-size:var(--font-sm);
  cursor:pointer; font-weight:500;
}
.settings-btn.export-btn { background:var(--s1l); color:var(--s1); }
.settings-btn.import-btn { background:var(--s2l); color:var(--s2); }
.settings-btn.reset-btn { background:#FEE; color:#E55; }

/* ============ Toast ============ */
.toast {
  position:fixed; top:60px; left:50%; transform:translateX(-50%);
  background:var(--text); color:#FFF; padding:10px 20px; border-radius:20px;
  font-size:var(--font-sm); z-index:200; animation:toastIn .3s;
  pointer-events:none; white-space:nowrap;
}
@keyframes toastIn { from { opacity:0; transform:translateX(-50%) translateY(-10px); } to { opacity:1; transform:translateX(-50%) translateY(0); } }

/* ============ 安装提示 ============ */
.install-banner {
  position:fixed; top:0; left:0; right:0; z-index:300;
  background:var(--text); color:#FFF; padding:10px 14px;
  display:flex; align-items:center; gap:10px;
  font-size:var(--font-sm); animation:slideDown .3s;
  box-shadow:0 2px 12px rgba(0,0,0,.15);
}
@keyframes slideDown { from { transform:translateY(-100%); } to { transform:translateY(0); } }
.install-banner .install-text { flex:1; line-height:1.4; }
.install-banner .install-btn {
  flex-shrink:0; padding:7px 16px; border:none; border-radius:18px;
  background:#FFF; color:var(--text); font-size:var(--font-sm);
  font-weight:600; cursor:pointer;
}
.install-banner .install-close {
  flex-shrink:0; width:24px; height:24px; border:none;
  border-radius:50%; background:rgba(255,255,255,.2);
  color:#FFF; font-size:12px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
}
</style>
</head>
<body>

<!-- 安装提示横幅 -->
<div id="installBanner" class="install-banner" style="display:none;">
  <span class="install-text">📲 添加到桌面，离线也能用</span>
  <button class="install-btn" id="installBtn">立即安装</button>
  <button class="install-close" id="installDismiss">✕</button>
</div>

<!-- ============ 顶部栏 ============ -->
<header class="topbar">
  <h1>🧠 公考速记</h1>
  <button class="topbar-btn" id="searchToggle" title="搜索">🔍</button>
  <button class="topbar-btn" id="settingsToggle" title="设置">⚙</button>
</header>

<!-- 搜索栏 -->
<div class="search-wrap" id="searchWrap">
  <input class="search-input" id="searchInput" type="search" placeholder="搜索组名...">
</div>

<!-- 板块标签 -->
<nav class="tabs-wrap" id="tabsWrap"></nav>

<!-- 主内容 -->
<main class="main" id="mainContent"></main>

<!-- 浮动按钮 -->
<div id="fabMenu" style="display:none;">
  <div class="fab-menu" id="fabMenuItems">
    <button class="fab-menu-item" data-action="newCard">
      <span class="fab-menu-icon">📝</span> 新建卡片
    </button>
    <button class="fab-menu-item" data-action="newGroup">
      <span class="fab-menu-icon">📁</span> 新建分组
    </button>
  </div>
</div>
<button class="fab" id="fabBtn">+</button>

<!-- 遮罩 + 弹窗容器 -->
<div id="overlay" style="display:none;" class="overlay"><div id="overlayContent"></div></div>

<!-- 弹出菜单 -->
<div id="popupMenu" class="popup-menu" style="display:none;"></div>

<!-- Toast容器 -->
<div id="toast" style="display:none;" class="toast"></div>

<!-- 隐藏的文件输入 -->
<input type="file" id="hiddenFileInput" style="display:none;" accept=".json">

<script>
/* =================================================================
   公考速记 PWA — 完整应用逻辑
   ================================================================= */
(function(){

// ==================== 常量 ====================
const SECTIONS = ['言语理解','判断推理','图形推理','资料分析','数量关系','申论'];
const COLORS = {
  '言语理解': { main:'#81C8B5', light:'#E8F5F0', cls:'s1' },
  '判断推理': { main:'#A8B8E0', light:'#EDF0FA', cls:'s2' },
  '图形推理': { main:'#C4A8D6', light:'#F3EDF8', cls:'s3' },
  '资料分析': { main:'#F0B896', light:'#FDF0E9', cls:'s4' },
  '数量关系': { main:'#F5D782', light:'#FFFBE8', cls:'s5' },
  '申论':     { main:'#E8988E', light:'#FCEAE8', cls:'s6' },
};
const IMG_MAX_KB = 2000;
const DB_NAME = 'gongkao_suji';
const DB_VERSION = 1;

// ==================== DOM 引用 ====================
const $ = (s) => document.querySelector(s);
const $$ = (s) => document.querySelectorAll(s);

const dom = {
  searchToggle: $('#searchToggle'),
  searchWrap: $('#searchWrap'),
  searchInput: $('#searchInput'),
  tabsWrap: $('#tabsWrap'),
  mainContent: $('#mainContent'),
  fabBtn: $('#fabBtn'),
  fabMenu: $('#fabMenu'),
  overlay: $('#overlay'),
  overlayContent: $('#overlayContent'),
  popupMenu: $('#popupMenu'),
  toast: $('#toast'),
  hiddenFileInput: $('#hiddenFileInput'),
  settingsToggle: $('#settingsToggle'),
};

// ==================== 状态 ====================
let db = null;
let state = { customHlWords: {},
  activeSection: '言语理解',
  searchQuery: '',
  expandedGroups: new Set(),
  highlightedCards: new Set()
};

// ==================== IndexedDB ====================
function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (e) => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains('sections')) {
        d.createObjectStore('sections', { keyPath: 'name' });
      }
    };
    req.onsuccess = (e) => { db = e.target.result; resolve(db); };
    req.onerror = () => reject(req.error);
  });
}

function dbGet(name) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction('sections', 'readonly');
    const req = tx.objectStore('sections').get(name);
    req.onsuccess = () => resolve(req.result ? req.result.data : { groups: [] });
    req.onerror = () => reject(req.error);
  });
}

function dbPut(name, data) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction('sections', 'readwrite');
    tx.objectStore('sections').put({ name, data });
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}

function dbGetAll() {
  return new Promise((resolve, reject) => {
    const tx = db.transaction('sections', 'readonly');
    const req = tx.objectStore('sections').getAll();
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

// ==================== 工具函数 ====================
function uuid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
}

function fmtDate(ts) {
  const d = new Date(ts);
  const now = new Date();
  const diff = now - d;
  if (diff < 60000) return '刚刚';
  if (diff < 3600000) return Math.floor(diff / 60000) + '分钟前';
  if (diff < 86400000) return Math.floor(diff / 3600000) + '小时前';
  return d.getMonth() + 1 + '/' + d.getDate();
}

function escapeHTML(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function renderCardText(text) {
  const escaped = escapeHTML(text);
  // 有换行则显示换行，无换行则紧凑
  if (text.includes('\n') || text.includes('\r')) {
    return `<div class="card-text card-text-multiline">${escaped.replace(/\n/g, '<br>')}</div>`;
  }
  return `<div class="card-text clamp">${escaped}</div>`;
}

function toast(msg, duration = 1800) {
  dom.toast.textContent = msg;
  dom.toast.style.display = 'block';
  clearTimeout(toast._tid);
  toast._tid = setTimeout(() => { dom.toast.style.display = 'none'; }, duration);
}

// ==================== 图片压缩 ====================
function compressImage(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const { naturalWidth: w, naturalHeight: h } = img;
        // 限制最大尺寸 1600px
        const MAX = 1600;
        let dw = w, dh = h;
        if (Math.max(w, h) > MAX) {
          if (w > h) { dw = MAX; dh = Math.round(h * MAX / w); }
          else { dh = MAX; dw = Math.round(w * MAX / h); }
        }
        const canvas = document.createElement('canvas');
        canvas.width = dw;
        canvas.height = dh;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, dw, dh);
        // 尝试不同质量级别
        function tryQuality(q) {
          return new Promise((rs) => {
            canvas.toBlob((blob) => {
              if (!blob) { rs(null); return; }
              const reader2 = new FileReader();
              reader2.onloadend = () => rs({
                dataUrl: reader2.result,
                size: blob.size,
                width: dw,
                height: dh,
              });
              reader2.readAsDataURL(blob);
            }, 'image/jpeg', q);
          });
        }
        tryQuality(0.9).then(async (r) => {
          if (!r) { reject(new Error('压缩失败')); return; }
          if (r.size > IMG_MAX_KB * 1024) {
            r = await tryQuality(0.75);
            if (!r) { reject(new Error('压缩失败')); return; }
          }
          if (r.size > IMG_MAX_KB * 1024) {
            r = await tryQuality(0.6);
            if (!r) { reject(new Error('压缩失败')); return; }
          }
          resolve(r);
        });
      };
      img.onerror = () => reject(new Error('图片加载失败'));
      img.src = e.target.result;
    };
    reader.onerror = () => reject(new Error('文件读取失败'));
    reader.readAsDataURL(file);
  });
}

// ==================== 渲染 ====================
function renderTabs() {
  const cls = COLORS[state.activeSection].cls;
  dom.tabsWrap.innerHTML = SECTIONS.map(s => {
    const c = COLORS[s].cls;
    return `<button class="tab ${c} ${s === state.activeSection ? 'active' : ''}" data-section="${s}">${s}</button>`;
  }).join('');
  // 滚动当前标签到可见位置
  requestAnimationFrame(() => {
    const active = dom.tabsWrap.querySelector('.tab.active');
    if (active) active.scrollIntoView({ behavior:'smooth', block:'nearest', inline:'center' });
  });
}

async function renderGroups() {
  const { groups } = await loadSection(state.activeSection);
  const cls = COLORS[state.activeSection].cls;
  const query = state.searchQuery.trim().toLowerCase();

  // 搜索：匹配组名或卡片文本内容
  let groupViews;
  if (query) {
    groupViews = groups
      .map(g => {
        const nameMatch = g.name.toLowerCase().includes(query);
        const matchedCards = g.cards.filter(c => c.type === "text" && c.content.toLowerCase().includes(query));
        const anyCardMatch = matchedCards.length > 0;
        if (!nameMatch && !anyCardMatch) return null;
        const displayCards = nameMatch ? g.cards : matchedCards;
        return { ...g, displayCards };
      })
      .filter(Boolean);
  } else {
    groupViews = groups.map(g => ({ ...g, displayCards: g.cards }));
  }

  if (groupViews.length === 0) {
    dom.mainContent.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">📭</div>
        <div class="empty-text">${query ? '没有匹配的内容' : '还没有分组<br>点击下方 + 创建第一个分组'}</div>
      </div>`;
    return;
  }

  dom.mainContent.innerHTML = groupViews.map(g => {
    // 搜索时自动展开所有匹配分组
    if (query) state.expandedGroups.add(g.id);
    const isOpen = state.expandedGroups.has(g.id);
    const isIdiom = g.name === '成语辨析' || g.name === '实词辨析';
    const bodyHTML = isIdiom
      ? `<div class="card-grid${isOpen ? ' open as-list' : ''}" data-group-id="${g.id}">${renderIdiomList(g.displayCards, g.id)}</div>`
      : `<div class="card-grid${isOpen ? ' open' : ''}" data-group-id="${g.id}">${renderCards({ ...g, cards: g.displayCards }, cls)}</div>`;
    return `
    <div class="group" data-group-id="${g.id}">
      <div class="group-header${isOpen ? '' : ' collapsed'}" data-group-id="${g.id}">
        <div class="group-color-bar ${cls}"></div>
        <span class="group-name">${escapeHTML(g.name)}</span>
        <span class="group-count">${g.cards.length}条</span>
        <span class="group-arrow${isOpen ? ' open' : ''}">▶</span>
        ${isIdiom ? '' : `<button class="group-menu-btn" data-group-id="${g.id}" data-action="groupMenu">⋯</button>`}
      </div>
      ${bodyHTML}
    </div>`;
  }).join('');

  // 绑定事件
  bindGroupEvents();
}

function renderCards(group, cls) {
  if (group.cards.length === 0) {
    return `<div style="text-align:center;padding:20px 12px;color:var(--sub);font-size:var(--font-xs);">空分组，点击 + 添加卡片</div>`;
  }
  return group.cards.map((card, idx) => {
    let inner = '';
    if (card.type === 'image') {
      inner = `<img class="card-img" src="${card.content}" alt="" loading="lazy">`;
    } else {
      inner = renderCardText(card.content || '');
    }
    return `
    <div class="card" data-card-id="${card.id}" data-group-id="${group.id}">
      <button class="card-more" data-card-id="${card.id}" data-group-id="${group.id}" data-action="cardMenu">⋯</button>
      ${inner}
      <div style="margin-top:6px;font-size:10px;color:var(--sub);">${fmtDate(card.createdAt)}</div>
    </div>`;
  }).join('');
}

function renderIdiomList(cards, gid) {
  // 去重：同词保留释义最长的那条
  var wordMap = {};
  for (var i2 = 0; i2 < cards.length; i2++) {
    var w = (cards[i2].content || '').split('\t')[0].trim();
    if (!w) continue;
    if (!wordMap[w] || (cards[i2].content || '').length > (wordMap[w].content || '').length) {
      wordMap[w] = cards[i2];
    }
  }
  cards = Object.values(wordMap);
  if (!cards.length) {
    return `<div style="text-align:center;padding:14px;color:var(--sub);font-size:var(--font-xs);">暂无成语，点击底部按钮同步</div>`;
  }
  const items = cards.map((c, i) => {
    const parts = (c.content || '').split('\t');
    const word = escapeHTML(parts[0] || '');
    var def = escapeHTML(parts[1] || '');
    // 自定义高亮词
    var hlWords = (state.customHlWords[gid] || '').trim();
    if (hlWords) {
      hlWords.split(/\s+/).forEach(function(w) {
        if (w.length < 2) return;
        var esc = w.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        def = def.replace(new RegExp(esc, 'g'), '<span class="hl-word">' + w + '</span>');
      });
    }
    const hl = state.highlightedCards.has(c.id) ? ' highlighted' : '';
    return `<div class="idiom-item${hl}" data-card-id="${c.id}" data-gid="${gid}" onclick="window._toggleIdiomHighlight('${c.id}','${gid}')"><span class="idiom-word">${word}</span><span class="idiom-def">${def}</span></div>`;
  }).join('');
  return `
    <div class="hl-input-wrap"><input class="hl-input" id="hl-input-${gid}" placeholder="输入高亮词，空格分隔" value="${escapeHTML(state.customHlWords[gid] || '')}" onkeydown="if(event.key==='Enter'){var v=this.value;this.blur();window._setCustomHl('${gid}', v)}"><span class="hl-hint">回车确认 ｜ 点词条标记</span></div>
    <div class="idiom-list">${items}</div>
    <div class="sync-bar" style="display:flex;gap:8px;">
      <button class="sync-btn" onclick="window._importFile()" style="flex:1;background:var(--s4l);color:#C97A5A;">📄 导入TXT</button>
    </div>`;
}

async function _toggleIdiomHighlight(cid, gid) {
  if (state.highlightedCards.has(cid)) {
    state.highlightedCards.delete(cid);
  } else {
    state.highlightedCards.add(cid);
  }
  var data = await loadSection(state.activeSection);
  var group = data.groups.find(function(g) { return g.id === gid; });
  if (group) {
    var card = group.cards.find(function(c) { return c.id === cid; });
    if (card) {
      card.highlighted = state.highlightedCards.has(cid);
      await saveSection(state.activeSection, { groups: data.groups });
    }
  }
  renderGroups();
}

async function _setCustomHl(gid, val) {
  var newWords = (val || '').trim();
  // 追加而非替换：合并已有高亮词和新输入词，去重
  var existing = (state.customHlWords[gid] || '').trim();
  var all = existing ? existing.split(/\s+/) : [];
  if (newWords) {
    newWords.split(/\s+/).forEach(function(w) {
      if (w && all.indexOf(w) < 0) all.push(w);
    });
  }
  state.customHlWords[gid] = all.join(' ');
  await renderGroups();
  // 输完后清空输入框
  var input = document.getElementById('hl-input-' + gid);
  if (input) input.value = '';
  // 滚到第一个高亮词
  var firstHl = document.querySelector('.idiom-list .hl-word');
  if (firstHl) { firstHl.scrollIntoView({ behavior:'smooth', block:'center' }); }
}

// ==================== 事件绑定 ====================
function bindGroupEvents() {
  // 折叠/展开分组
  dom.mainContent.querySelectorAll('.group-header').forEach(h => {
    h.addEventListener('click', (e) => {
      if (e.target.closest('.group-menu-btn')) return; // 不拦截菜单按钮
      const gid = h.dataset.groupId;
      if (state.expandedGroups.has(gid)) {
        state.expandedGroups.delete(gid);
      } else {
        state.expandedGroups.add(gid);
      }
      renderGroups();
    });
  });

  // 分组菜单按钮
  dom.mainContent.querySelectorAll('.group-menu-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const gid = btn.dataset.groupId;
      const rect = btn.getBoundingClientRect();
      showPopup(rect.left - 100, rect.bottom + 4, [
        { action:'renameGroup', label:'✏️ 重命名', data:gid },
        { action:'deleteGroup', label:'🗑️ 删除分组', data:gid, danger:true },
      ]);
    });
  });

  // 卡片更多按钮
  dom.mainContent.querySelectorAll('.card-more').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const cid = btn.dataset.cardId;
      const gid = btn.dataset.groupId;
      const rect = btn.getBoundingClientRect();
      showPopup(rect.left - 120, rect.bottom + 2, [
        { action:'viewCard', label:'👁️ 查看详情', data:{gid, cid} },
        { action:'editCard', label:'✏️ 编辑', data:{gid, cid} },
        { action:'moveUp', label:'⬆️ 上移', data:{gid, cid} },
        { action:'moveDown', label:'⬇️ 下移', data:{gid, cid} },
        { action:'deleteCard', label:'🗑️ 删除', data:{gid, cid}, danger:true },
      ]);
    });
  });

  // 卡片点击查看
  dom.mainContent.querySelectorAll('.card').forEach(card => {
    card.addEventListener('click', (e) => {
      if (e.target.closest('.card-more')) return;
      const cid = card.dataset.cardId;
      const gid = card.dataset.groupId;
      showCardDetail(gid, cid);
    });
  });
}

// ==================== 弹出菜单点击处理 ====================
dom.popupMenu.addEventListener('click', async (e) => {
  const btn = e.target.closest('.popup-item');
  if (!btn) return;
  const action = btn.dataset.action;
  const items = dom.popupMenu._items || [];
  const item = items.find(i => i.action === action);

  hidePopup();

  if (!item) return;

  if (action === 'viewCard') {
    showCardDetail(item.data.gid, item.data.cid);
  } else if (action === 'editCard') {
    showEditCardSheet(item.data.gid, item.data.cid);
  } else if (action === 'moveUp') {
    await moveCard(item.data.gid, item.data.cid, 'up');
  } else if (action === 'moveDown') {
    await moveCard(item.data.gid, item.data.cid, 'down');
  } else if (action === 'deleteCard') {
    await deleteCard(item.data.gid, item.data.cid);
  } else if (action === 'renameGroup') {
    showRenameGroupSheet(item.data);
  } else if (action === 'deleteGroup') {
    await deleteGroup(item.data);
  }
});

async function showAddCardSheet(presetGroupId) {
  const { groups } = await loadSection(state.activeSection);
  if (groups.length === 0) {
    toast('请先创建分组');
    showAddGroupSheet();
    return;
  }
  showOverlay(`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:10px;">
      <button class="sheet-btn secondary" style="width:auto;flex:0;" onclick="window._hideOverlay()">← 取消</button>
      <span style="font-size:var(--font-sm);font-weight:600;">📝 新建卡片</span>
      <button class="sheet-btn primary" style="width:auto;flex:0;" id="saveCardBtn">保存</button>
    </div>
    <div class="sheet-field">
      <div class="sheet-label">类型 · 所属分组</div>
      <div style="display:flex;gap:8px;">
        <select class="sheet-select" id="cardType" style="flex:1;">
          <option value="text">文本</option>
          <option value="image">图片</option>
        </select>
        <select class="sheet-select" id="cardGroup" style="flex:2;">
          ${groups.map(g => `<option value="${g.id}" ${g.id === presetGroupId ? 'selected' : ''}>${escapeHTML(g.name)}</option>`).join('')}
        </select>
      </div>
    </div>
    <div class="sheet-field" id="textField" style="margin:0;">
      <textarea class="sheet-textarea tall" id="cardText" placeholder="输入知识点内容..."></textarea>
    </div>
    <div class="sheet-field" id="imageField" style="display:none;">
      <div class="sheet-file-area" id="fileArea">
        <span class="file-icon">🖼️</span>
        <span class="file-hint">点击选择图片（自动压缩至${IMG_MAX_KB / 1000}MB以内）</span>
      </div>
      <img class="sheet-preview-img" id="imagePreview" style="display:none;" alt="">
    </div>
  `);

  let pendingImage = null;

  // 类型切换
  $('#cardType').addEventListener('change', (e) => {
    const isImg = e.target.value === 'image';
    $('#textField').style.display = isImg ? 'none' : 'block';
    $('#imageField').style.display = isImg ? 'block' : 'none';
  });

  // 文件选择
  $('#fileArea').addEventListener('click', () => {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'image/*';
    input.onchange = async (ev) => {
      const file = ev.target.files[0];
      if (!file) return;
      toast('正在压缩图片...');
      try {
        pendingImage = await compressImage(file);
        const preview = $('#imagePreview');
        preview.src = pendingImage.dataUrl;
        preview.style.display = 'block';
        $('#fileArea').querySelector('.file-icon').textContent = '✅';
        $('#fileArea').querySelector('.file-hint').textContent =
          `已选择 (${(pendingImage.size / 1024).toFixed(0)}KB, ${pendingImage.width}×${pendingImage.height})`;
      } catch (err) {
        toast('图片处理失败，请重试');
      }
    };
    input.click();
  });

  // 保存
  $('#saveCardBtn').addEventListener('click', async () => {
    const type = $('#cardType').value;
    const groupId = $('#cardGroup').value;
    if (type === 'text') {
      const text = $('#cardText').value.trim();
      if (!text) { toast('请输入内容'); return; }
      await addCard(groupId, { id: uuid(), type:'text', content:text });
    } else {
      if (!pendingImage) { toast('请选择图片'); return; }
      await addCard(groupId, {
        type:'image',
        content: pendingImage.dataUrl,
        imgW: pendingImage.width,
        imgH: pendingImage.height,
      });
    }
    hideOverlay();
    toast('卡片已添加');
  });
}

async function addGroup(name) {

async function addCard(gid, cardData) {
  const { groups } = await loadSection(state.activeSection);
  const group = groups.find(g => g.id === gid);
  if (!group) return;
  group.cards.unshift({
    id: uuid(),
    ...cardData,
    createdAt: Date.now(),
  });
  await saveSection(state.activeSection, { groups });
  state.expandedGroups.add(gid);
  renderGroups();
}

async function updateCard(gid, cid, updates) {
  const { groups } = await loadSection(state.activeSection);
  const group = groups.find(g => g.id === gid);
  if (!group) return;
  const card = group.cards.find(c => c.id === cid);
  if (!card) return;
  Object.assign(card, updates);
  await saveSection(state.activeSection, { groups });
  renderGroups();
}

async function deleteCard(gid, cid) {
  const { groups } = await loadSection(state.activeSection);
  const group = groups.find(g => g.id === gid);
  if (!group) return;
  group.cards = group.cards.filter(c => c.id !== cid);
  await saveSection(state.activeSection, { groups });
  toast('卡片已删除');
  renderGroups();
}

async function moveCard(gid, cid, direction) {
  const { groups } = await loadSection(state.activeSection);
  const group = groups.find(g => g.id === gid);
  if (!group) return;
  const idx = group.cards.findIndex(c => c.id === cid);
  if (idx === -1) return;
  if (direction === 'up' && idx > 0) {
    [group.cards[idx - 1], group.cards[idx]] = [group.cards[idx], group.cards[idx - 1]];
  } else if (direction === 'down' && idx < group.cards.length - 1) {
    [group.cards[idx], group.cards[idx + 1]] = [group.cards[idx + 1], group.cards[idx]];
  } else {
    return; // 已在边界
  }
  await saveSection(state.activeSection, { groups });
  renderGroups();
}

async function exportData() {
  const all = await dbGetAll();
  const data = {};
  all.forEach(row => { data[row.name] = row.data; });
  const json = JSON.stringify(data, null, 2);
  const blob = new Blob([json], { type:'application/json' });

  a.href = url;

dom.hiddenFileInput.addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  try {
    const text = await file.text();
    const data = JSON.parse(text);
    // 验证格式
    if (typeof data !== 'object') throw new Error('无效格式');
    for (const sec of SECTIONS) {
      if (data[sec] && !data[sec].groups) throw new Error(`板块「${sec}」数据格式错误`);
    }
    // 弹出选择

function showImportMode(data) {
  showOverlay(`
    <div class="confirm-box">
      <div class="confirm-title">📥 导入数据</div>
      <div class="confirm-text">选择导入方式：</div>
      <div class="sheet-actions" style="flex-direction:column;">
        <button class="sheet-btn primary" id="importMerge">合并（保留现有 + 新增内容）</button>
        <button class="sheet-btn danger" id="importOverwrite">覆盖（替换全部数据）</button>
        <button class="sheet-btn secondary" onclick="window._hideOverlay()">取消</button>
      </div>
    </div>
  `, 'confirm-box');

  $('#importMerge')?.addEventListener('click', () => doImport(data, 'merge'));
  $('#importOverwrite')?.addEventListener('click', () => doImport(data, 'overwrite'));
}

async function doImport(data, mode) {
  try {
    if (mode === 'overwrite') {
      for (const sec of SECTIONS) {
        await saveSection(sec, data[sec] || { groups: [] });
      }
    } else {
      // 合并：同名分组追加卡片，新分组直接添加
      for (const sec of SECTIONS) {
        if (!data[sec]) continue;
        const existing = await loadSection(sec);
        const existMap = new Map(existing.groups.map(g => [g.name, g]));
        for (const g of data[sec].groups || []) {
          if (existMap.has(g.name)) {
            const existGroup = existMap.get(g.name);
            const existCardIds = new Set(existGroup.cards.map(c => c.id));
            for (const c of g.cards || []) {
              if (!existCardIds.has(c.id)) {
                existGroup.cards.push(c);
              }
            }
          } else {
            existing.groups.push(g);
          }
        }
        await saveSection(sec, existing);
      }
    }
    hideOverlay();
    toast('导入成功');
    render();
  } catch (err) {
    toast('导入失败：' + err.message);
  }
}

// ==================== PWA 注册 ====================
function registerPWA() {
  // Manifest — 动态插入，localtunnel HTTPS 下触发原生安装
  if (!document.querySelector("link[rel=manifest]")) {
    var link = document.createElement("link");
    link.rel = "manifest";
    link.href = "/gongkao-suji/manifest.json";
    document.head.appendChild(link);
  }
  // Service Worker — 注册server上的/sw.js（持久URL，浏览器重启后仍有效）
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').then(function(reg) {
      // 检测到新SW时自动刷新，避免运行旧代码
      reg.addEventListener('updatefound', function() {
        var newWorker = reg.installing;
        if (!newWorker) return;
        newWorker.addEventListener('statechange', function() {
          if (newWorker.state === 'activated' && navigator.serviceWorker.controller) {
            toast('🔄 代码已更新，自动刷新');
            setTimeout(function() { location.reload(); }, 1000);
          }
        });
      });
    }).catch(function(err) { console.error('SW注册失败:', err); });
  }
}

// ==================== 成语数据：从记录本加载/导入 ====================
// 全量替换成语/实词组（唯一数据写入点）
async function fullReplaceIdioms(cyCards, swCards) {
  var sec = state.activeSection;
  var data = await loadSection(sec);
  // 移除旧的成语/实词组
  data.groups = data.groups.filter(function(g) { return g.name !== '成语辨析' && g.name !== '实词辨析'; });
  // 添加新的
  if (cyCards && cyCards.length) {
    data.groups.push({ id: 'idiom-cy-' + uuid(), name: '成语辨析', cards: cyCards, createdAt: Date.now() - 4200 });
  }
  if (swCards && swCards.length) {
    data.groups.push({ id: 'idiom-sw-' + uuid(), name: '实词辨析', cards: swCards, createdAt: Date.now() - 4100 });
  }
  await saveSection(sec, data);
}

// 从 txt 文件导入（兜底方案）
function _importFile() {
  var input = document.createElement('input');
  input.type = 'file';
  input.accept = '.txt,text/plain';
  input.onchange = async function(e) {
    var file = e.target.files[0];
    if (!file) return;
    try {
      var text = await file.text();
      var lines = text.split('\n').filter(function(l) { return l.trim(); });
      var records = lines.map(function(l) {
        var idx = l.indexOf('\t');
        return idx >= 0 ? [l.slice(0,idx).trim(), l.slice(idx+1).trim()] : [l.trim(), ''];
      });
      // 分类 + 去重（同词保留释义最长的）
      var seenCy = {}, seenSw = {};
      var now = Date.now();
      for (var i = 0; i < records.length; i++) {
        var word = records[i][0];
        if (!word) continue;
        var def = records[i][1] || '';
        var card = { id: uuid(), type: 'text', content: word + '\t' + def, createdAt: now - i * 100 };
        if (word.length === 4) {
          if (!seenCy[word] || def.length > (seenCy[word].content || '').split('\t')[1].length) {
            seenCy[word] = card;
          }
        } else {
          if (!seenSw[word] || def.length > (seenSw[word].content || '').split('\t')[1].length) {
            seenSw[word] = card;
          }
        }
      }
      var cyCards = Object.values(seenCy);
      var swCards = Object.values(seenSw);
      await fullReplaceIdioms(cyCards, swCards);
      toast('✅ 导入完成：成语' + cyCards.length + '条、实词' + swCards.length + '条');
      renderGroups();
    } catch(err) {
      toast('❌ 文件读取失败：' + err.message);
    }
  };
  input.click();
}

// ==================== 手势滑动切换板块 ====================
let touchStartX = 0, touchStartY = 0;
dom.mainContent.addEventListener('touchstart', (e) => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });

dom.mainContent.addEventListener('touchend', (e) => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) < 50 || Math.abs(dx) < Math.abs(dy)) return;
  const curIdx = SECTIONS.indexOf(state.activeSection);
  if (dx < 0 && curIdx < SECTIONS.length - 1) {
    state.activeSection = SECTIONS[curIdx + 1];
  } else if (dx > 0 && curIdx > 0) {
    state.activeSection = SECTIONS[curIdx - 1];
  } else return;
  state.searchQuery = '';
  state.highlightedCards = new Set();
  dom.searchInput.value = '';
  dom.searchWrap.classList.remove('show');
  closeFab();
  loadSection(state.activeSection).then(function(d) {
    (d.groups || []).forEach(function(g) {
      (g.cards || []).forEach(function(c) { if (c.highlighted) state.highlightedCards.add(c.id); });
    });
    render();
  });
});

// ==================== 初始化 ====================
async function init() {
  try {
    await openDB();
    for (const sec of SECTIONS) {
      const existing = await dbGet(sec);
      if (!existing.groups) {
        await saveSection(sec, { groups: [] });
      }
    }
    await seedGongwenGroup();
    await seedIdiomGroup();
    var initData = await loadSection(state.activeSection);
    (initData.groups || []).forEach(function(g) {
      (g.cards || []).forEach(function(c) {
        if (c.highlighted) state.highlightedCards.add(c.id);
      });
    });
  } catch (err) {
    toast('存储初始化失败，请检查浏览器设置');
    console.error(err);
  }
  registerPWA();
  render();
  // 显式缓存页面→SW Cache。localtunnel拦截页会破坏SW自动缓存，这里直接拿当前页面HTML存进去
  if ('caches' in window) {
    setTimeout(function() {
      var pageHTML = '<!DOCTYPE html>\n' + document.documentElement.outerHTML;
      caches.open('gongkao-v10').then(function(c) {
        return c.put('/gongkao-suji/', new Response(pageHTML, {
          headers: { 'Content-Type': 'text/html; charset=utf-8' }
        }));
      }).catch(function(){});
    }, 3000);
  }
}

async function render() {
  renderTabs();
  try { await renderGroups(); } catch(e) { console.error('renderGroups error:', e); }
}

init().catch(console.error);

})();
</script>
